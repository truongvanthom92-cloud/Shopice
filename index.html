<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blox Fruits shop ice</title>
    <style>
        /* CSS: Giao diện */
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #eef2f3; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .disclaimer { color: #d9534f; font-weight: bold; font-size: 0.85em; margin-bottom: 20px; }
        button { padding: 12px 20px; margin: 10px; cursor: pointer; border: none; background: #28a745; color: white; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #218838; }
        #result-area { margin-top: 20px; padding: 20px; border: 2px dashed #ccc; border-radius: 10px; min-height: 100px; }
        .login-box { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="login-box" id="login-section">
        <h3>Đăng nhập (Giả lập)</h3>
        <input type="text" id="username" placeholder="Nhập tên Roblox của bạn">
        <button onclick="login()">Đăng nhập</button>
    </div>

    <h1>Blox Fruits Simulator</h1>
    <p class="disclaimer">Trang web này chỉ để giải trí, mọi vật phẩm đều là ảo!</p>
    
    <div id="game-section" style="display:none;">
        <p>Chào mừng: <span id="display-user"></span></p>
        <button onclick="openBox('Tân Thủ')">Mở Túi Tân Thủ</button>
        <button onclick="openBox('Huyền Bí')">Mở Túi Huyền Bí</button>
        <div id="result-area">Chọn túi để bắt đầu quay!</div>
    </div>
</div>

<script>
    // JS: Logic xử lý
    function login() {
        const user = document.getElementById('username').value;
        if(user.trim() !== "") {
            document.getElementById('display-user').innerText = user;
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('game-section').style.display = 'block';
        } else {
            alert("Vui lòng nhập tên!");
        }
    }

    const items = {
        'Tân Thủ': ['Rocket', 'Spin', 'Chop', 'Spring'],
        'Huyền Bí': ['Love', 'Spider', 'T-Rex', 'Mammoth', 'Kitsune']
    };

    function openBox(type) {
        const area = document.getElementById('result-area');
        area.innerHTML = "Đang mở...";
        
        setTimeout(() => {
            const list = items[type];
            const item = list[Math.floor(Math.random() * list.length)];
            area.innerHTML = `
                <h3>Kết quả:</h3>
                <p style="font-size: 20px; color: #007bff;"><strong>${item}</strong></p>
                <button onclick="alert('Đã gửi yêu cầu rút về kho ảo!')">Rút vật phẩm về túi</button>
            `;
        }, 1000);
    }
</script>

</body>
</html>
