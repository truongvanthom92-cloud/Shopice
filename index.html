<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Vòng Quay Blox Fruits - Pro Simulation</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        #wheel { width: 300px; height: 300px; border: 10px solid #f1c40f; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; background: #ecf0f1; color: #333; font-weight: bold; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .controls { background: #34495e; padding: 15px; border-radius: 10px; margin-top: 20px; }
        input { padding: 8px; width: 80px; }
        button { padding: 10px 20px; cursor: pointer; background: #e74c3c; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Vòng Quay Blox Fruits</h1>
    <div id="wheel">Vật phẩm</div>
    
    <div class="controls">
        <h3>Cấu hình vòng quay</h3>
        <input type="text" id="itemName" placeholder="Tên vật phẩm">
        <input type="number" id="itemRate" placeholder="Tỉ lệ %">
        <input type="text" id="imgUrl" placeholder="Link ảnh">
        <button onclick="addItem()">Thêm vào vòng</button>
        <br><br>
        <button onclick="spin()" style="background:#2ecc71; font-size: 20px;">QUAY NGAY</button>
    </div>
</div>

<script>
    let items = []; // Lưu trữ vật phẩm và tỉ lệ

    function addItem() {
        let name = document.getElementById('itemName').value;
        let rate = parseFloat(document.getElementById('itemRate').value);
        let img = document.getElementById('imgUrl').value;
        
        items.push({ name, rate, img });
        alert("Đã thêm: " + name + " với tỉ lệ " + rate + "%");
    }

    function spin() {
        if(items.length === 0) return alert("Thêm vật phẩm đi đã!");
        
        const wheel = document.getElementById('wheel');
        let random = Math.random() * 100; // Random từ 0-100
        let currentRate = 0;
        let selectedItem = null;

        // Thuật toán tính tỉ lệ chuẩn xác
        for(let item of items) {
            currentRate += item.rate;
            if(random <= currentRate) {
                selectedItem = item;
                break;
            }
        }

        // Tạo hiệu ứng xoay mượt
        let rotation = 3600 + Math.floor(Math.random() * 360); 
        wheel.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            if(selectedItem) {
                wheel.innerHTML = `<img src="${selectedItem.img}" width="50"><br>${selectedItem.name}`;
                alert("Chúc mừng mày trúng: " + selectedItem.name);
            }
        }, 4000);
    }
</script>

</body>
</html>
