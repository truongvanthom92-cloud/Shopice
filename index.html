<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Site</title>
    <style>
        /* CSS: Giao diện tối hiện đại */
        body { background-color: #0b0e14; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .section-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Container chứa các item, ẩn những cái quá khung hình */
        .carousel-container { display: flex; overflow-x: hidden; gap: 20px; padding: 10px; position: relative; }
        .item-card { background: #1a202c; min-width: 200px; padding: 15px; border-radius: 12px; border: 1px solid #2d3748; }
        .item-img { width: 100%; height: 120px; background: #2d3748; border-radius: 8px; margin-bottom: 10px; }

        /* Nút mũi tên */
        .arrow-btn { background: #333; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 50%; font-size: 18px; }
    </style>
</head>
<body>

    <div class="section-title">
        <h2>Vũ khí mới nhất</h2>
        <button class="arrow-btn" onclick="moveCarousel(1)">→</button>
    </div>

    <div class="carousel-container" id="carousel">
        <div class="item-card">
            <div class="item-img" style="background: linear-gradient(to right, #6a11cb, #2575fc);"></div>
            <h3>Dao Âm Dương</h3>
            <p>Giá trị: 10.000</p>
        </div>
        <div class="item-card">
            <div class="item-img" style="background: linear-gradient(to right, #ff7e5f, #feb47b);"></div>
            <h3>Quạt Nước</h3>
            <p>Giá trị: 8.915</p>
        </div>
        <div class="item-card">
            <div class="item-img" style="background: linear-gradient(to right, #00c6ff, #0072ff);"></div>
            <h3>Kiếm Phép</h3>
            <p>Giá trị: 15.200</p>
        </div>
    </div>

<script>
    // JS: Xử lý cuộn mượt
    let scrollPosition = 0;
    const container = document.getElementById('carousel');

    function moveCarousel(direction) {
        const itemWidth = 220; // Độ rộng 1 item + gap
        scrollPosition += direction * itemWidth;
        
        // Giới hạn cuộn không để bị âm hoặc quá xa
        if (scrollPosition < 0) scrollPosition = 0;
        
        container.scrollTo({
            left: scrollPosition,
            behavior: 'smooth' // Làm cho việc di chuyển mượt mà
        });
    }
</script>
</body>
</html>
