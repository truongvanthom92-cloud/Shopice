<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; color: #ff69b4; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; margin: auto; background: #222; border: 2px solid #ff69b4; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><h2>YAN DEV 🌸 - [WASD] Di chuyển - [Space] Giết</h2></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 300, y: 200, color: "#ff69b4" };
    let victim = { x: 100, y: 100, alive: true };
    let blood = [];

    window.addEventListener("keydown", (e) => {
        if (e.key === "w") player.y -= 10;
        if (e.key === "s") player.y += 10;
        if (e.key === "a") player.x -= 10;
        if (e.key === "d") player.x += 10;
        if (e.key === " ") { // Nút giết
            if (Math.abs(player.x - victim.x) < 50 && victim.alive) {
                victim.alive = false;
                blood.push({x: victim.x, y: victim.y});
                new Audio('https://www.myinstants.com/media/sounds/stab.mp3').play();
            }
        }
    });

    function draw() {
        ctx.clearRect(0, 0, 600, 400);
        // Vẽ máu
        blood.forEach(b => { ctx.fillStyle = "red"; ctx.fillRect(b.x, b.y, 20, 20); });
        // Vẽ nạn nhân
        if(victim.alive) { ctx.fillStyle = "white"; ctx.fillRect(victim.x, victim.y, 30, 30); }
        // Vẽ Yandere
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, 30, 30);
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
