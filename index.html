<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxtsar Value Checker</title>
    <style>
        body { background-color: #0b0e14; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Grid 2 cột */
        .value-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Card vật phẩm */
        .item-card { background: #1a1e28; border-radius: 12px; overflow: hidden; padding-bottom: 10px; }
        
        /* Nền Gradient cầu vồng phía trên ảnh */
        .img-bg { 
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3); 
            height: 120px; display: flex; align-items: center; justify-content: center;
        }
        .item-img { width: 80%; }
        
        /* Thông tin */
        .info { padding: 10px; }
        .name { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        .rarity { color: #ff69b4; font-size: 0.9em; font-weight: bold; }
        .stat { font-size: 0.9em; color: #ccc; margin-top: 5px; }
        .price { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<h3>Vũ khí mới nhất</h3>
<div class="value-grid">
    <div class="item-card">
        <div class="img-bg"><img src="item1.png" class="item-img" alt="Item"></div>
        <div class="info">
            <div class="name">Mèo gai Stanli</div>
            <div class="rarity">Huyền thoại</div>
            <div class="stat">Giá trị: 30.000</div>
            <div class="stat">RAP: <span class="price">16.002</span></div>
        </div>
    </div>
    
    <div class="item-card">
        <div class="img-bg"><img src="item2.png" class="item-img" alt="Item"></div>
        <div class="info">
            <div class="name">Thuốc xịt y tế</div>
            <div class="rarity">Huyền thoại</div>
            <div class="stat">Giá trị: 30.000</div>
            <div class="stat">RAP: <span class="price">19.766</span></div>
        </div>
    </div>
</div>

</body>
</html>
