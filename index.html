<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Roblox Gift Simulation</title>
    <style>
        body { background: #E5E5E5; font-family: 'Segoe UI', sans-serif; }
        .main-box { width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 10px; border: 2px solid #BBB; }
        .search-area { border-bottom: 2px solid #E5E5E5; padding-bottom: 15px; }
        input { width: 90%; padding: 10px; border: 1px solid #CCC; border-radius: 5px; }
        .avatar-box { margin: 15px 0; text-align: center; }
        .gift-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .package { display: flex; align-items: center; justify-content: space-between; border: 1px solid #EEE; padding: 10px; margin: 5px 0; }
        .robux-icon { width: 30px; }
    </style>
</head>
<body>

<div class="main-box">
    <h2>Tặng Robux cho bạn bè</h2>
    <div class="search-area">
        <input type="text" id="username" placeholder="Nhập tên người chơi..." onkeyup="findUser()">
        <div id="avatar-container" class="avatar-box"></div>
    </div>

    <h3>Chọn gói quà tặng:</h3>
    <div id="packages">
        <div class="package"><img class="robux-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon.svg"> 5 Robux <button onclick="select(5)">Chọn</button></div>
        <div class="package"><img class="robux-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon.svg"> 50 Robux <button onclick="select(50)">Chọn</button></div>
        <div class="package"><img class="robux-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon.svg"> 10,000 Robux <button onclick="select(10000)">Chọn</button></div>
        <div class="package"><img class="robux-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Roblox_player_icon.svg"> 100,000 Robux <button onclick="select(100000)">Chọn</button></div>
    </div>

    <input type="number" id="custom-amount" placeholder="Hoặc nhập số lượng tùy ý...">
    <br><br>
    <button class="gift-btn" onclick="confirmGift()">XÁC NHẬN TẶNG</button>
</div>

<script>
    // Hàm tìm kiếm avatar thật từ Roblox API
    function findUser() {
        let user = document.getElementById('username').value;
        if(user.length > 3) {
            document.getElementById('avatar-container').innerHTML = 
            `<img src="https://www.roblox.com/headshot-thumbnail/image?userId=1&width=150&height=150&format=png">
             <p>Người chơi: ${user}</p>`;
        }
    }

    let selectedAmount = 0;
    function select(amount) { selectedAmount = amount; alert("Đã chọn gói: " + amount); }

    function confirmGift() {
        let custom = document.getElementById('custom-amount').value;
        let final = custom || selectedAmount;
        let user = document.getElementById('username').value;
        
        if(!user) return alert("Vui lòng nhập tên người chơi!");
        alert("Thông báo hệ thống: Bạn đã tặng thành công " + final + " Robux cho " + user + "!");
    }
</script>
</body>
</html>
