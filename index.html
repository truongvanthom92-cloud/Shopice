<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baddies Brawl Shop - 10 Gói</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #fff0f5; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: white; padding: 10px; border-radius: 15px; border: 2px solid #ff69b4; text-align: center; }
        .btn-buy { background: #d63384; color: white; border: none; padding: 10px; border-radius: 15px; width: 100%; cursor: pointer; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 1000; }
        .content { background: white; padding: 20px; border-radius: 20px; width: 85%; text-align: center; }
        
        /* 6 cái túi */
        .bag-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .bag { background: #ff69b4; padding: 20px 0; border-radius: 10px; color: white; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#d63384;">Baddies Brawl Shop</h2>
    <div class="grid" id="productGrid"></div>
</div>

<div id="m1" class="modal"><div class="content">
    <h3>Chọn 1 trong 6 túi may mắn!</h3>
    <div class="bag-grid" id="bagContainer"></div>
</div></div>

<div id="m2" class="modal"><div class="content">
    <h3>Xác nhận thanh toán</h3>
    <p>Chuyển khoản xong hãy nhập tên Zalo để mình check đơn nhé!</p>
    <input type="text" id="zaloInput" placeholder="Tên Zalo..." style="padding:10px; width:80%;">
    <button class="btn-buy" style="margin-top:10px;" onclick="step3()">Đã chuyển khoản</button>
</div></div>

<div id="m3" class="modal"><div class="content">
    <h3>Acc của bạn đây!</h3>
    <div style="background:#eee; padding:15px; border-radius:10px; margin:10px 0;">
        User: Baddie_Pro<br>Pass: Slay_Code_123
    </div>
    <button onclick="location.reload()" style="background:red; color:white; border:none; padding:10px 30px; border-radius:10px;">X Thoát</button>
</div></div>

<script>
    // 10 gói giá tăng dần
    const prices = [20, 49, 79, 99, 129, 149, 199, 249, 299, 399];
    const grid = document.getElementById('productGrid');
    const bagContainer = document.getElementById('bagContainer');
    
    prices.forEach(p => {
        grid.innerHTML += `<div class="card"><p><b>Gói ${p}K</b></p><button class="btn-buy" onclick="showMystery()">Mua Ngay</button></div>`;
    });

    // Tạo 6 túi
    for(let i=0; i<6; i++) {
        bagContainer.innerHTML += `<div class="bag" onclick="step2()">?</div>`;
    }

    function showMystery() { document.getElementById('m1').style.display = 'flex'; }
    function step2() { document.getElementById('m1').style.display='none'; document.getElementById('m2').style.display='flex'; }
    function step3() {
        if(document.getElementById('zaloInput').value == "") return alert("Nhập tên Zalo!");
        document.getElementById('m2').style.display='none'; document.getElementById('m3').style.display='flex';
    }
</script>

</body>
</html>
