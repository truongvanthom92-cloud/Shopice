<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Baddies Phone Ultra</title>
    <style>
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        /* Khung điện thoại */
        .phone { width: 320px; height: 650px; background: #1e293b; border-radius: 45px; border: 6px solid #334155; position: relative; box-shadow: 0 0 50px rgba(124, 58, 237, 0.5); overflow: hidden; }
        .status-bar { display: flex; justify-content: space-between; padding: 15px 25px; font-size: 14px; font-weight: bold; color: #cbd5e1; }
        .screen { padding: 10px; }
        
        /* Grid App */
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .app-icon { background: linear-gradient(135deg, #8b5cf6, #ec4899); width: 70px; height: 70px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: white; text-align: center; font-size: 11px; font-weight: bold; }
        .app-icon:hover { transform: scale(0.9); }

        /* Modal App */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; color: white; padding: 20px; z-index: 10; box-sizing: border-box; }
        .item { padding: 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; cursor: pointer; }
        button { cursor: pointer; padding: 8px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="phone">
    <div class="status-bar">
        <span id="clock">00:00</span>
        <span>⚡ 98%</span>
    </div>

    <div class="screen">
        <div class="app-grid">
            <div class="app-icon" onclick="openApp('bank')">💰<br>Bank</div>
            <div class="app-icon" onclick="openApp('shop')">🛍️<br>Diva</div>
            <div class="app-icon" onclick="alert('Định vị: Ho Chi Minh City')">🗺️<br>Maps</div>
            <div class="app-icon" onclick="alert('Playing: Chill Beats...')">🎵<br>Music</div>
            <div class="app-icon" onclick="alert('Ghi chú đã lưu!')">📝<br>Notes</div>
            <div class="app-icon" onclick="alert('Đã khóa cửa nhà!')">🔒<br>Home</div>
        </div>
    </div>

    <div id="bank" class="modal">
        <button onclick="closeApp('bank')">← Back</button>
        <h3>Baddies Bank</h3>
        <div style="background: #334155; padding: 20px; border-radius: 10px; margin-top: 20px;">
            Số dư hiện tại: <h2 id="balance">100,000,000</h2> VNĐ
        </div>
    </div>

    <div id="shop" class="modal">
        <button onclick="closeApp('shop')">← Back</button>
        <h3>Diva Shopping</h3>
        <div class="item" onclick="buy('Son Môi', 500000)">💄 Son Môi <span>500k</span></div>
        <div class="item" onclick="buy('Phấn Mắt', 300000)">🎨 Phấn Mắt <span>300k</span></div>
        <div class="item" onclick="buy('Váy Đầm', 2000000)">👗 Váy Đầm <span>2tr</span></div>
        <div class="item" onclick="buy('Dép', 200000)">👡 Dép <span>200k</span></div>
        <div class="item" onclick="buy('Gấu Bông', 800000)">🧸 Gấu Bông <span>800k</span></div>
        
        <h4 style="color:#ec4899; margin-top:30px;">🧧 Voucher Giảm Giá</h4>
        <div class="item" onclick="startMission()">🎟️ Giảm 20% (Làm nhiệm vụ)</div>
    </div>
</div>

<script>
    let balance = 100000000;
    let discount = 1;

    // Thời gian thực
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000);
    updateClock();

    function openApp(id) { document.getElementById(id).style.display = 'block'; }
    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    function startMission() {
        if(confirm("Nhiệm vụ: Xem quảng cáo để nhận Voucher giảm 20%?")) {
            alert("Nhiệm vụ hoàn thành! Voucher đã được kích hoạt.");
            discount = 0.8;
        }
    }

    function buy(name, price) {
        let finalPrice = price * discount;
        if(confirm("Mua " + name + " với giá " + finalPrice.toLocaleString() + " VNĐ?")) {
            if(balance >= finalPrice) {
                balance -= finalPrice;
                document.getElementById('balance').innerText = balance.toLocaleString();
                alert("✅ Mua thành công " + name + "!");
            } else {
                alert("❌ Không đủ tiền!");
            }
        }
    }
</script>
</body>
</html>
