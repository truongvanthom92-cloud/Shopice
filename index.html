<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhận Code Mini World</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #16213e; padding: 20px; border-radius: 15px; }
        .item-box { border: 2px solid #0f3460; padding: 15px; margin: 15px 0; border-radius: 10px; }
        img { width: 100px; height: 100px; border-radius: 10px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background: #e94560; color: white; font-weight: bold; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <h2>Đăng nhập Mini World</h2>
    <input type="text" id="mw-id" placeholder="Nhập Mini World ID của bạn">
    <button onclick="login()">Đăng nhập</button>
</div>

<div class="container" id="code-box" style="display:none;">
    <h2>Nhận Code Vật Phẩm</h2>
    
    <div class="item-box">
        <img src="https://i.imgur.com/1000011410.png" alt="Ice Fan"> <p>Quạt Băng</p>
        <code id="code1">icefan2026</code>
        <button onclick="copyCode('code1')">Copy Code</button>
    </div>

    <div class="item-box">
        <img src="https://i.imgur.com/1000011411.png" alt="Egg Fan"> <p>Quạt Trứng</p>
        <code id="code2">eggfanupd2026</code>
        <button onclick="copyCode('code2')">Copy Code</button>
    </div>
</div>

<script>
    function login() {
        let id = document.getElementById('mw-id').value;
        if(id) {
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('code-box').style.display = 'block';
        } else {
            alert("Vui lòng nhập ID!");
        }
    }

    function copyCode(id) {
        let text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        alert("Đã copy: " + text);
    }
</script>
</body>
</html>
