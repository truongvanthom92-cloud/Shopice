<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Roblox Inventory - Legend Edition</title>
    <style>
        body { background: #3b0764; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .inventory-box { background: #7e22ce; width: 850px; height: 500px; border-radius: 20px; padding: 25px; border: 4px solid #d8b4fe; display: flex; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        
        /* Grid 4x2 */
        .item-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 60%; }
        .item-card { 
            width: 130px; height: 130px; border-radius: 12px; background: linear-gradient(135deg, #ff00ff, #00ffff, #ffff00, #ff0000);
            padding: 4px; cursor: pointer; transition: 0.3s;
        }
        .item-inner { background: #4c1d95; width: 100%; height: 100%; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .item-card:hover { transform: scale(1.08); box-shadow: 0 0 20px #fff; }

        /* Panel chi tiết */
        .info-panel { width: 35%; padding: 20px; background: #6b21a8; border-radius: 15px; border: 2px solid #a855f7; margin-left: 20px; display: none; }
    </style>
</head>
<body>

<div class="inventory-box">
    <div class="item-grid" id="grid"></div>
    <div class="info-panel" id="panel">
        <h2 id="name">Tên</h2>
        <p id="val" style="font-size: 1.5em; color: #fbbf24;">Value: 0</p>
        <button onclick="playClick()" style="padding: 10px 20px; cursor: pointer;">Sao chép</button>
    </div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
    const data = [
        { name: "Spiked Kitty", val: "50.000" }, { name: "Harpoon", val: "12.000" },
        { name: "Sledge Hammer", val: "25.000" }, { name: "Sakura Blade", val: "85.000" },
        { name: "Snowball Launcher", val: "15.000" }, { name: "Spiked Knuckles", val: "45.000" },
        { name: "Golden Snowball", val: "9.999999999999" }, { name: "Loveboard", val: "30.000" }
    ];

    const grid = document.getElementById('grid');
    data.forEach((item, i) => {
        grid.innerHTML += `
            <div class="item-card" onclick="show('${item.name}', '${item.val}')">
                <div class="item-inner">SKIN ${i+1}</div>
            </div>
        `;
    });

    function show(n, v) {
        document.getElementById('panel').style.display = 'block';
        document.getElementById('name').innerText = n;
        document.getElementById('val').innerText = "Value: " + v;
        document.getElementById('sound').play();
    }
</script>
</body>
</html>
