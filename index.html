<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Roblox Shop Simulation Pro</title>
    <style>
        body { background: #E5E5E5; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .shop-container { max-width: 900px; margin: auto; background: #FFF; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #E5E5E5; padding-bottom: 10px; }
        
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { background: #F2F2F2; border: 1px solid #CCC; border-radius: 8px; padding: 15px; text-align: center; transition: 0.3s; }
        .item-card:hover { transform: translateY(-5px); border-color: #0084DD; }
        
        /* Modal Animation */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; text-align: center; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="shop-container">
    <div class="header">
        <h1>Marketplace</h1>
        <div id="balance" style="font-size: 20px; font-weight: bold;">💰 10000 Robux</div>
    </div>

    <div class="item-grid">
        <div class="item-card">
            <h3>Fire Sword</h3>
            <div style="height:100px; background:linear-gradient(45deg, red, orange); border-radius:5px;"></div>
            <p>Giá: 2000 Robux</p>
            <button onclick="showConfirm(2000, 'Fire Sword')">Mua Ngay</button>
        </div>
        <div class="item-card">
            <h3>Ice Wings</h3>
            <div style="height:100px; background:linear-gradient(45deg, cyan, blue); border-radius:5px;"></div>
            <p>Giá: 3500 Robux</p>
            <button onclick="showConfirm(3500, 'Ice Wings')">Mua Ngay</button>
        </div>
    </div>
</div>

<div class="modal" id="confirm-modal">
    <div class="modal-content">
        <h2>Xác nhận mua?</h2>
        <p id="confirm-text"></p>
        <button onclick="buyItem()">Xác nhận</button>
        <button onclick="closeModal()" style="background:red;">Hủy</button>
    </div>
</div>

<script>
    let balance = 10000;
    let pendingPrice = 0;

    function showConfirm(price, name) {
        pendingPrice = price;
        document.getElementById('confirm-text').innerText = "Bạn muốn mua " + name + " với giá " + price + " Robux?";
        document.getElementById('confirm-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }

    function buyItem() {
        if(balance >= pendingPrice) {
            balance -= pendingPrice;
            updateUI();
            alert("Mua thành công!");
        } else {
            alert("Không đủ tiền!");
        }
        closeModal();
    }

    function updateUI() {
        if(balance < 500) { // Nếu tiền dưới 500 thì tự động reset về 10000
            alert("Ví cạn kiệt! Hệ thống đang cộng thêm tiền...");
            balance = 10000;
        }
        document.getElementById('balance').innerText = "💰 " + balance + " Robux";
    }
</script>
</body>
</html>
