<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0b16; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .section-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { background: #16182e; border-radius: 15px; overflow: hidden; }
        .card-img { height: 150px; background: linear-gradient(45deg, #ff00ff, #ff0000, #ffff00); }
        .card-info { padding: 15px; }
        .card-title { font-weight: bold; margin-bottom: 5px; }
        .card-val { color: #888; font-size: 14px; }
    </style>
</head>
<body>

<div class="section-title">Vũ khí mới nhất ></div>
<div class="grid">
    <div class="card">
        <div class="card-img"></div>
        <div class="card-info">
            <div class="card-title">Dao Âm Dương</div>
            <div class="card-val">Giá trị: 257.875</div>
            <div class="card-val">RAP: 1</div>
        </div>
    </div>
    <div class="card">
        <div class="card-img"></div>
        <div class="card-info">
            <div class="card-title">Quạt nước</div>
            <div class="card-val">Giá trị: 7</div>
            <div class="card-val">RAP: 8.915</div>
        </div>
    </div>
</div>

</body>
</html>
