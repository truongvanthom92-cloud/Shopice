<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Baddies Phone Pro</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .phone { width: 340px; height: 680px; background: #000; border-radius: 50px; border: 10px solid #222; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; }
        .screen { padding: 30px; color: white; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* Grid App hiện đại */
        .app-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 60px; }
        .app-card { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .app-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.3); }

        /* Modal phong cách hiện đại */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; color: #333; padding: 20px; box-sizing: border-box; }
        .item-list { overflow-y: auto; height: 450px; }
        .item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="phone">
    <div class="screen" id="home">
        <h2 style="text-align: center; margin-top: 20px;">16:02</h2>
        <div class="app-grid">
            <div class="app-card" onclick="openApp('bank')">💰<br>Bank</div>
            <div class="app-card" onclick="openApp('shop')">🛍️<br>Diva Shop</div>
            <div class="app-card" onclick="alert('Đang phát triển...')">📸<br>Camera</div>
            <div class="app-card" onclick="alert('Không có thông báo mới!')">🔔<br>Alert</div>
        </div>
    </div>

    <div id="bank" class="modal">
        <button onclick="closeApp('bank')">✕ Đóng</button>
        <h2>Baddies Bank</h2>
        <div style="background:#2d3436; color:white; padding:20px; border-radius:15px;">
            Số dư: <span id="balance">10,000,000</span> VNĐ
        </div>
        <input type="number" id="pay-amount" placeholder="Nhập số tiền..." style="width:100%; margin:20px 0; padding:10px;">
        <button onclick="processPayment()" style="width:100%; background:green; color:white; padding:10px;">Xác nhận chuyển</button>
    </div>

    <div id="shop" class="modal">
        <button onclick="closeApp('shop')">✕ Đóng</button>
        <h3>Diva Shopping</h3>
        <input type="text" placeholder="Tìm sản phẩm..." style="width:100%; padding:8px;">
        <div class="item-list">
            <div class="item"><span>Son Môi - 500k</span> <button onclick="buyItem(500000)">Mua</button></div>
            <div class="item"><span>Váy Dạ Hội - 2tr</span> <button onclick="buyItem(2000000)">Mua</button></div>
            <div class="item"><span>Nước Hoa - 1tr</span> <button onclick="buyItem(1000000)">Mua</button></div>
            <div class="item"><span>Voucher 50% - 0đ</span> <button onclick="alert('Đã nhận Voucher!')">Lấy</button></div>
        </div>
    </div>
</div>

<script>
    let balance = 10000000;
    let pendingPrice = 0;

    function openApp(id) { document.getElementById(id).style.display = 'block'; }
    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    function buyItem(price) {
        pendingPrice = price;
        alert("Đã thêm vào giỏ hàng! Qua app Bank để thanh toán.");
        openApp('bank');
        document.getElementById('pay-amount').value = price;
    }

    function processPayment() {
        let amount = parseInt(document.getElementById('pay-amount').value);
        if(amount === pendingPrice && balance >= amount) {
            balance -= amount;
            document.getElementById('balance').innerText = balance.toLocaleString();
            alert("✅ Giao dịch thành công!");
        } else {
            alert("❌ Lỗi thanh toán!");
        }
    }
</script>
</body>
                                                                </html>
