<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Divas Vemu - Pro</title>
    <style>
        body { background: #0a0a0c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .phone { width: 320px; height: 650px; background: #121212; border-radius: 50px; border: 8px solid #333; position: relative; overflow: hidden; box-shadow: 0 0 40px rgba(100, 50, 150, 0.5); }
        .screen { height: 100%; background: radial-gradient(circle at center, #2e1a47 0%, #0a0a0c 100%); padding: 30px; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; }
        .icon { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #121212; color: white; padding: 25px; z-index: 20; box-sizing: border-box; }
        .btn-action { background: #555; padding: 10px; margin-top: 10px; border-radius: 8px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<div class="phone">
    <div class="screen">
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:12px;">
            <span id="clock">00:00</span>
            <span>⚡ 100%</span>
        </div>
        <h1 style="color:white; text-align:center; margin-top:50px; font-weight:300;">divas vemu</h1>
        <div class="app-grid">
            <div onclick="requestPassword()"><div class="icon" style="background:#27ae60">💰</div><center style="color:white;font-size:10px">Bank</center></div>
            <div onclick="openApp('shop')"><div class="icon" style="background:#e67e22">🛍️</div><center style="color:white;font-size:10px">Shop</center></div>
            <div onclick="openApp('money')"><div class="icon" style="background:#f59e0b">💵</div><center style="color:white;font-size:10px">Baddies</center></div>
        </div>
    </div>

    <div id="bank" class="modal">
        <button onclick="closeApp('bank')">←</button>
        <h3>Baddies Bank</h3>
        <p>Số dư: <span id="balance-display">10,000,000</span> VNĐ</p>
    </div>

    <div id="shop" class="modal">
        <button onclick="closeApp('shop')">←</button>
        <h3>Diva Shopping</h3>
        <div id="shop-items">
            <div class="btn-action" onclick="buy('Son Môi', 500000)">💄 Son Môi (500k)</div>
            <div class="btn-action" onclick="buy('Váy Đầm', 2000000)">👗 Váy Đầm (2tr)</div>
            <div id="tracking-btn" class="btn-action" style="display:none; background:#d97706;" onclick="trackOrder()">🚚 Đang vận chuyển...</div>
        </div>
    </div>

    <div id="money" class="modal">
        <button onclick="closeApp('money')">←</button>
        <div class="btn-action" onclick="nap(1000000)">Nạp 1tr</div>
    </div>
</div>

<script>
    let balance = 100000000;
    let password = "123";

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); }
    setInterval(updateClock, 1000); updateClock();

    function requestPassword() {
        let input = prompt("Nhập mật khẩu ngân hàng:");
        if (input === password) { openApp('bank'); } else { alert("Sai mật khẩu!"); }
    }

    function openApp(id) { document.getElementById(id).style.display = 'block'; }
    function closeApp(id) { document.getElementById(id).style.display = 'none'; }

    function buy(name, price) {
        if(balance >= price) {
            balance -= price;
            document.getElementById('balance-display').innerText = balance.toLocaleString();
            document.getElementById('tracking-btn').style.display = 'block';
            alert("Mua thành công " + name);
        }
    }

    function trackOrder() { alert("Đơn hàng của bạn đang đến nơi! Dự kiến: 5 phút nữa."); }
    function nap(amt) { balance += amt; document.getElementById('balance-display').innerText = balance.toLocaleString(); alert("Đã nạp!"); }
</script>
</body>
</html>
