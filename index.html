<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gemini Core Dashboard</title>
    <style>
        /* CSS phong cách Dashboard công nghệ cao */
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .dashboard { 
            width: 850px; 
            height: 480px; 
            background: #1e293b; 
            border-radius: 25px; 
            padding: 40px; 
            display: grid; 
            grid-template-columns: 1fr 1.5fr; 
            gap: 40px; 
            border: 1px solid #334155;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .profile-side { border-right: 1px solid #334155; padding-right: 20px; text-align: center; }
        .clock { font-size: 3.5rem; font-weight: bold; color: #8b5cf6; margin: 20px 0; }
        
        .task-list { list-style: none; padding: 0; }
        .task { 
            background: #0f172a; 
            padding: 15px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            border-left: 4px solid #8b5cf6;
            cursor: pointer;
            transition: 0.3s;
        }
        .task:hover { background: #334155; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="profile-side">
        <h2>GEMINI CORE</h2>
        <div class="clock" id="time">00:00</div>
        <p>Trạng thái: <span style="color:#22c55e">● ONLINE</span></p>
    </div>
    
    <div>
        <h3>Lịch trình ưu tiên</h3>
        <div class="task-list">
            <div class="task" onclick="this.style.opacity='0.3'">09:00 - Tối ưu hóa Database 🚀</div>
            <div class="task" onclick="this.style.opacity='0.3'">13:00 - Phân tích dữ liệu người dùng 🧠</div>
            <div class="task" onclick="this.style.opacity='0.3'">17:00 - Cập nhật bảo mật hệ thống 🛡️</div>
        </div>
        <button onclick="location.reload()" style="background:#8b5cf6; border:none; color:white; padding:10px 20px; border-radius:8px; cursor:pointer; margin-top:20px;">Làm mới hệ thống</button>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('time').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
